<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NovaDark | Scientific Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0b0e18, #030507);
            padding: 1rem;
        }

        /* MODERN DARK THEME CALCULATOR — Glassmorphism + Deep Dark */
        .calculator {
            background: rgba(8, 12, 20, 0.92);
            backdrop-filter: blur(0px);
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(66, 153, 225, 0.2), inset 0 1px 0 rgba(255,255,255,0.05);
            max-width: 580px;
            width: 100%;
            transition: all 0.3s ease;
            border: 1px solid rgba(30, 60, 90, 0.6);
        }

        /* DISPLAY — futuristic dark glass panel */
        .display {
            background: #03060c;
            border-radius: 1.8rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.8rem;
            text-align: right;
            border: 1px solid #1e3a5f;
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5), 0 2px 0 rgba(80, 160, 255, 0.1);
            transition: all 0.2s;
        }

        .previous-operand {
            color: #8aa0b5;
            font-size: 1rem;
            min-height: 28px;
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.3px;
            font-weight: 400;
        }

        .current-operand {
            color: #f0fcff;
            font-size: 2.7rem;
            font-weight: 600;
            min-height: 4.2rem;
            word-wrap: break-word;
            word-break: break-all;
            line-height: 1.2;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 0 6px rgba(0, 160, 255, 0.3);
            letter-spacing: 1px;
        }

        /* BUTTON GRID — 5 columns for scientific layout */
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
        }

        /* GLOBAL BUTTON STYLES (MODERN DARK + GLOW) */
        button {
            border: none;
            border-radius: 1.2rem;
            padding: 1rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
            background: #101a26;
            color: #eef5ff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        /* HOVER ANIMATIONS: lift, glow, scale */
        button:hover {
            transform: translateY(-3px) scale(1.02);
            filter: brightness(1.12);
            box-shadow: 0 12px 20px rgba(0, 30, 60, 0.5), 0 0 0 1px rgba(0, 180, 255, 0.4);
        }

        button:active {
            transform: translateY(2px) scale(0.98);
            transition: 0.05s;
            filter: brightness(0.92);
        }

        /* Number buttons — deep indigo/blue gradient */
        .btn-number {
            background: linear-gradient(145deg, #0f1b2c, #09121e);
            border-bottom: 2px solid #2c6c9e;
            font-weight: 500;
        }
        .btn-number:hover {
            background: linear-gradient(145deg, #15283f, #0d1a2a);
            border-bottom-color: #3e8bc9;
            text-shadow: 0 0 5px #6bc8ff;
        }

        /* Basic operators (÷, ×, -, +) — electric blue accent */
        .btn-operator {
            background: linear-gradient(145deg, #0f3f66, #07273f);
            border-bottom: 2px solid #2f9eff;
            font-weight: 700;
            color: #c6e9ff;
        }
        .btn-operator:hover {
            background: linear-gradient(145deg, #1c5890, #0e3a5c);
            border-bottom-color: #6bc4ff;
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.4);
        }

        /* Scientific function buttons (sin, cos, tan, log, sqrt, ln, etc) */
        .btn-scientific {
            background: linear-gradient(145deg, #0e2a44, #051525);
            border-bottom: 2px solid #3f86b0;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        .btn-scientific:hover {
            background: linear-gradient(145deg, #1a3f62, #0a2038);
            border-bottom-color: #5ea6dc;
            text-shadow: 0 0 4px #a0dbff;
        }

        /* Function buttons (AC, DEL, %) */
        .btn-function {
            background: linear-gradient(145deg, #14273e, #0a1727);
            border-bottom: 2px solid #5480aa;
            font-weight: 600;
        }
        .btn-function:hover {
            background: linear-gradient(145deg, #1d3857, #0f2137);
        }

        /* Equals button — vibrant cyan/blue glow */
        .btn-equals {
            background: linear-gradient(135deg, #1f6eb0, #0a4a7a);
            grid-column: span 2;
            font-weight: 800;
            font-size: 1.3rem;
            border-bottom: 2px solid #8acdff;
            box-shadow: 0 6px 14px rgba(0, 110, 210, 0.4);
        }
        .btn-equals:hover {
            background: linear-gradient(135deg, #3389cf, #1462a0);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 22px rgba(0, 130, 230, 0.6);
        }

        /* Zero button spans two columns */
        .btn-zero {
            grid-column: span 2;
            background: linear-gradient(145deg, #0f1b2c, #09121e);
        }

        /* Responsive design: mobile first adjustments */
        @media (max-width: 550px) {
            .calculator {
                padding: 1rem;
                border-radius: 1.8rem;
            }
            .buttons {
                gap: 0.55rem;
            }
            button {
                padding: 0.75rem 0;
                font-size: 0.85rem;
                border-radius: 0.9rem;
            }
            .btn-scientific {
                font-size: 0.75rem;
            }
            .btn-equals {
                font-size: 1.1rem;
            }
            .current-operand {
                font-size: 2rem;
            }
            .previous-operand {
                font-size: 0.85rem;
            }
            .display {
                padding: 0.9rem 1rem;
                margin-bottom: 1.2rem;
            }
        }

        @media (max-width: 440px) {
            .buttons {
                gap: 0.45rem;
            }
            button {
                padding: 0.65rem 0;
                font-size: 0.75rem;
            }
            .btn-scientific {
                font-size: 0.68rem;
            }
            .btn-equals {
                font-size: 1rem;
            }
            .current-operand {
                font-size: 1.7rem;
            }
        }

        /* subtle ripple-like hover micro interaction */
        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0%;
            height: 0%;
            background: rgba(80, 180, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
            pointer-events: none;
        }
        button:hover::after {
            width: 140%;
            height: 140%;
        }

        /* focus style for accessibility */
        button:focus-visible {
            outline: 2px solid #4faaff;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
<div class="calculator">
    <div class="display">
        <div class="previous-operand" id="previousOperand"></div>
        <div class="current-operand" id="currentOperand">0</div>
    </div>
    <div class="buttons">
        <!-- Scientific row -->
        <button class="btn-scientific" aria-label="sine" onclick="calculator.sin()">sin</button>
        <button class="btn-scientific" aria-label="cosine" onclick="calculator.cos()">cos</button>
        <button class="btn-scientific" aria-label="tangent" onclick="calculator.tan()">tan</button>
        <button class="btn-scientific" aria-label="square root" onclick="calculator.sqrt()">√</button>
        <button class="btn-scientific" aria-label="log base 10" onclick="calculator.log()">log</button>

        <!-- Controls & extra scientific -->
        <button class="btn-function" onclick="calculator.clear()">AC</button>
        <button class="btn-function" onclick="calculator.delete()">DEL</button>
        <button class="btn-function" onclick="calculator.percentage()">%</button>
        <button class="btn-operator" onclick="calculator.chooseOperation('÷')">÷</button>
        <button class="btn-scientific" onclick="calculator.ln()">ln</button>

        <!-- Numbers row 7 8 9 -->
        <button class="btn-number" onclick="calculator.appendNumber('7')">7</button>
        <button class="btn-number" onclick="calculator.appendNumber('8')">8</button>
        <button class="btn-number" onclick="calculator.appendNumber('9')">9</button>
        <button class="btn-operator" onclick="calculator.chooseOperation('×')">×</button>
        <button class="btn-scientific" onclick="calculator.pow2()">x²</button>

        <!-- Numbers 4 5 6 -->
        <button class="btn-number" onclick="calculator.appendNumber('4')">4</button>
        <button class="btn-number" onclick="calculator.appendNumber('5')">5</button>
        <button class="btn-number" onclick="calculator.appendNumber('6')">6</button>
        <button class="btn-operator" onclick="calculator.chooseOperation('-')">−</button>
        <button class="btn-scientific" onclick="calculator.pi()">π</button>

        <!-- Numbers 1 2 3 -->
        <button class="btn-number" onclick="calculator.appendNumber('1')">1</button>
        <button class="btn-number" onclick="calculator.appendNumber('2')">2</button>
        <button class="btn-number" onclick="calculator.appendNumber('3')">3</button>
        <button class="btn-operator" onclick="calculator.chooseOperation('+')">+</button>
        <button class="btn-scientific" onclick="calculator.exp()">e</button>

        <!-- Bottom row: 0, ., =, 1/x, n! -->
        <button class="btn-number btn-zero" onclick="calculator.appendNumber('0')">0</button>
        <button class="btn-number" onclick="calculator.appendNumber('.')">.</button>
        <button class="btn-equals" onclick="calculator.compute()">=</button>
        <button class="btn-scientific" onclick="calculator.inverse()">1/x</button>
        <button class="btn-scientific" onclick="calculator.fact()">n!</button>
    </div>
</div>

<script>
    // -----------------------------------------------
    // MODERN SCIENTIFIC CALCULATOR (Dark Theme Compatible)
    // Full scientific functions: sin, cos, tan, sqrt, log, ln, x², 1/x, π, e, factorial
    // Responsive & enhanced with robust error handling
    // -----------------------------------------------
    class ModernScientificCalculator {
        constructor(previousOperandElement, currentOperandElement) {
            this.previousOperandElement = previousOperandElement;
            this.currentOperandElement = currentOperandElement;
            this.clear();
        }

        clear() {
            this.currentOperand = '0';
            this.previousOperand = '';
            this.operation = undefined;
            this.updateDisplay();
        }

        delete() {
            if (this.currentOperand === '0') return;
            if (this.currentOperand.length === 1) {
                this.currentOperand = '0';
            } else {
                this.currentOperand = this.currentOperand.slice(0, -1);
            }
            if (this.currentOperand === '.' || this.currentOperand === '') {
                this.currentOperand = '0';
            }
            this.updateDisplay();
        }

        getCurrentNumber() {
            return parseFloat(this.currentOperand);
        }

        setCurrentValue(value, roundLimit = true) {
            if (isNaN(value) || !isFinite(value)) {
                alert('Math Error');
                this.clear();
                return;
            }
            let strVal = value.toString();
            if (strVal.includes('e') && Math.abs(value) > 1e12) {
                strVal = value.toExponential(8);
            } else if (strVal.includes('.') && strVal.split('.')[1]?.length > 10) {
                strVal = value.toFixed(10).replace(/\.?0+$/, '');
            }
            this.currentOperand = strVal;
            this.updateDisplay();
        }

        // ----- SCIENTIFIC OPERATIONS -----
        sin() {
            let val = this.getCurrentNumber();
            let result = Math.sin(val);
            this.setCurrentValue(result);
        }
        cos() {
            let val = this.getCurrentNumber();
            let result = Math.cos(val);
            this.setCurrentValue(result);
        }
        tan() {
            let val = this.getCurrentNumber();
            let result = Math.tan(val);
            if (Math.abs(result) > 1e15 || !isFinite(result)) {
                alert('tan undefined at this angle');
                return;
            }
            this.setCurrentValue(result);
        }
        sqrt() {
            let val = this.getCurrentNumber();
            if (val < 0) {
                alert('Cannot take square root of negative');
                return;
            }
            this.setCurrentValue(Math.sqrt(val));
        }
        log() {
            let val = this.getCurrentNumber();
            if (val <= 0) {
                alert('Log base 10 undefined for non-positive');
                return;
            }
            this.setCurrentValue(Math.log10(val));
        }
        ln() {
            let val = this.getCurrentNumber();
            if (val <= 0) {
                alert('Natural log undefined for non-positive');
                return;
            }
            this.setCurrentValue(Math.log(val));
        }
        pow2() {
            let val = this.getCurrentNumber();
            this.setCurrentValue(val * val);
        }
        inverse() {
            let val = this.getCurrentNumber();
            if (val === 0) {
                alert('Reciprocal of zero undefined');
                return;
            }
            this.setCurrentValue(1 / val);
        }
        pi() {
            this.currentOperand = Math.PI.toString();
            this.updateDisplay();
        }
        exp() {
            this.currentOperand = Math.E.toString();
            this.updateDisplay();
        }
        fact() {
            let val = this.getCurrentNumber();
            if (val < 0 || !Number.isInteger(val)) {
                alert('Factorial requires non-negative integer');
                return;
            }
            if (val > 170) {
                alert('Value too large for factorial');
                return;
            }
            let result = 1;
            for (let i = 2; i <= val; i++) result *= i;
            this.setCurrentValue(result);
        }
        percentage() {
            let val = this.getCurrentNumber();
            this.setCurrentValue(val / 100);
        }

        // ---- Basic arithmetic & UI ----
        appendNumber(number) {
            if (number === '.' && this.currentOperand.includes('.')) return;
            if (this.currentOperand === '0' && number !== '.') {
                this.currentOperand = number;
            } else {
                this.currentOperand += number;
            }
            if (this.currentOperand.length > 20) {
                this.currentOperand = this.currentOperand.slice(0, 20);
            }
            this.updateDisplay();
        }

        chooseOperation(operation) {
            if (this.currentOperand === '') return;
            if (this.previousOperand !== '') {
                this.compute();
            }
            this.operation = operation;
            this.previousOperand = this.currentOperand + ' ' + operation;
            this.currentOperand = '0';
            this.updateDisplay();
        }

        compute() {
            let computation;
            const prev = parseFloat(this.previousOperand);
            const current = parseFloat(this.currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            switch (this.operation) {
                case '+': computation = prev + current; break;
                case '-': computation = prev - current; break;
                case '×': computation = prev * current; break;
                case '÷':
                    if (current === 0) {
                        alert('Cannot divide by zero');
                        this.clear();
                        return;
                    }
                    computation = prev / current;
                    break;
                default: return;
            }
            if (Math.abs(computation) < 1e-12 && computation !== 0) computation = 0;
            let resultStr = computation.toString();
            if (resultStr.includes('.') && resultStr.split('.')[1]?.length > 10) {
                resultStr = computation.toFixed(10).replace(/\.?0+$/, '');
            }
            this.currentOperand = resultStr;
            this.operation = undefined;
            this.previousOperand = '';
            this.updateDisplay();
        }

        // Format with thousand separators for readability
        getDisplayNumber(number) {
            const strNum = number.toString();
            if (strNum.includes('e')) return strNum;
            const parts = strNum.split('.');
            let intPart = parts[0];
            const decPart = parts[1];
            let formattedInt = '';
            if (intPart === '' || intPart === '-') formattedInt = intPart === '-' ? '-0' : '0';
            else {
                const intNum = parseInt(intPart, 10);
                if (!isNaN(intNum)) formattedInt = intNum.toLocaleString('en-US');
                else formattedInt = intPart;
            }
            if (decPart !== undefined) {
                let trimmedDec = decPart.slice(0, 8);
                return `${formattedInt}.${trimmedDec}`;
            }
            return formattedInt;
        }

        updateDisplay() {
            let dispVal = this.currentOperand;
            if (dispVal === undefined || dispVal === '') dispVal = '0';
            if (parseFloat(dispVal) === 0 && dispVal.startsWith('-')) dispVal = '0';
            this.currentOperandElement.textContent = this.getDisplayNumber(dispVal);
            this.previousOperandElement.textContent = this.previousOperand;
        }
    }

    // Initialize
    const previousOperandElement = document.getElementById('previousOperand');
    const currentOperandElement = document.getElementById('currentOperand');
    const calculator = new ModernScientificCalculator(previousOperandElement, currentOperandElement);

    // ---------- FULL KEYBOARD SUPPORT (with extra scientific shortcuts) ----------
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        // numbers & decimal
        if (/^[0-9]$/.test(key)) { e.preventDefault(); calculator.appendNumber(key); }
        if (key === '.') { e.preventDefault(); calculator.appendNumber('.'); }
        // basic operators
        if (key === '+') { e.preventDefault(); calculator.chooseOperation('+'); }
        if (key === '-') { e.preventDefault(); calculator.chooseOperation('-'); }
        if (key === '*') { e.preventDefault(); calculator.chooseOperation('×'); }
        if (key === '/') { e.preventDefault(); calculator.chooseOperation('÷'); }
        if (key === 'Enter' || key === '=') { e.preventDefault(); calculator.compute(); }
        if (key === 'Escape') { e.preventDefault(); calculator.clear(); }
        if (key === 'Backspace') { e.preventDefault(); calculator.delete(); }
        if (key === '%') { e.preventDefault(); calculator.percentage(); }
        
        // Scientific hotkeys: s=sin, c=cos, t=tan, r=sqrt, l=log, n=ln, q=x², i=1/x, p=π, e constant, f=factorial
        if (key === 's') { e.preventDefault(); calculator.sin(); }
        if (key === 'c') { e.preventDefault(); calculator.cos(); }
        if (key === 't') { e.preventDefault(); calculator.tan(); }
        if (key === 'r') { e.preventDefault(); calculator.sqrt(); }
        if (key === 'l') { e.preventDefault(); calculator.log(); }
        if (key === 'n') { e.preventDefault(); calculator.ln(); }
        if (key === 'q') { e.preventDefault(); calculator.pow2(); }
        if (key === 'i') { e.preventDefault(); calculator.inverse(); }
        if (key === 'p') { e.preventDefault(); calculator.pi(); }
        if (key === 'e') { e.preventDefault(); calculator.exp(); }
        if (key === 'f') { e.preventDefault(); calculator.fact(); }
    });

    // Disable context menu on calculator for clean feel
    document.querySelector('.calculator')?.addEventListener('contextmenu', (e) => e.preventDefault());
</script>
</body>
</html>
